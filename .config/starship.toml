# Minimal Catppuccin Mocha starship config

format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$c\
$java\
$nodejs\
$docker_context\
$cmd_duration\
$username\
$hostname\
$line_break\
$character"""

# Directory
[directory]
style = "bold #cba6f7"
truncation_length = 3
truncate_to_repo = true

# Git
[git_branch]
format = "[ $symbol$branch]($style) "
symbol = ""
style = "bold #a6e3a1"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #f38ba8"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# Languages — only show when relevant
[python]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold #f9e2af"
detect_files = ["*.py", "requirements.txt", "pyproject.toml", "setup.py"]

[rust]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold #fab387"
detect_files = ["Cargo.toml"]

[c]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold #89dceb"
detect_files = ["*.c", "*.h", "*.cpp", "*.hpp", "CMakeLists.txt", "Makefile"]

[java]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold #f38ba8"
detect_files = ["*.java", "pom.xml", "build.gradle"]

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
style = "bold #a6e3a1"
detect_files = ["package.json"]

[docker_context]
format = "[$symbol$context]($style) "
symbol = " "
style = "bold #89b4fa"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# Command duration — only shows when > 2 seconds
[cmd_duration]
min_time = 2000
format = "[ $duration]($style) "
style = "bold #f9e2af"

# SSH indicator — only shows in SSH sessions
[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold #a6e3a1"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold #a6e3a1"

# Prompt character — pink Catppuccin flamingo
# Success = pink, error = red
[character]
success_symbol = "[❯](#f5c2e7)"
error_symbol = "[❯](#f38ba8)"

# Disable things we don't need
[package]
disabled = true

[line_break]
disabled = false
