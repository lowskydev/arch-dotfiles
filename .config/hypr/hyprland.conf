################
### MONITORS ###
################

monitor = DP-5, 3840x2160@144, 0x0, 2, vrr, 2
monitor = DP-4, 3840x2160@144, 1920x0, 2, vrr, 2

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$mainMod = SUPER

#####################
### STARTUP APPS  ###
#####################

exec-once = hyprpaper
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = waybar
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Wayland toolkits
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# Spotify fix
env = GDK_SCALE,2

# Icon Theme
env = GTK_THEME,Adwaita-dark

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(f38ba8ff)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeOut, slide
    animation = border, 1, 20, easeOut
    animation = borderangle, 0
    animation = fade, 1, 4, easeOut
    animation = workspaces, 1, 5, overshot, slide
}

dwindle {
    preserve_split = true
    smart_split = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = 0
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

cursor {
    no_hardware_cursors = 2
}

####################
### SMART GAPS   ###
####################

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
workspace = 1, monitor:DP-5, default:true
workspace = 2, monitor:DP-4, default:true

#####################
### WINDOW RULES  ###
#####################

# JetBrains fix
windowrule = match:xwayland true, no_initial_focus on

####################
### XWAYLAND     ###
####################

xwayland {
    force_zero_scaling = true
}

####################
### KEYBINDINGS  ###
####################

# Terminal
bind = $mainMod, Q, exec, $terminal

# Close window
bind = $mainMod, C, killactive

# Exit Hyprland
bind = $mainMod SHIFT, E, exit

# Toggle floating
bind = $mainMod SHIFT, V, togglefloating

# Fullscreen
bind = $mainMod, F, fullscreen

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Also with vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Enter resize mode
bind = $mainMod, F2, submap, resize
submap = resize

# Resize with arrow keys (repeatable - hold to keep resizing)
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30

# Same with vim keys
binde = , l, resizeactive, 30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0 30

# Exit resize mode
bind = , escape, submap, reset
bind = , return, submap, reset

submap = reset

# Volume keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

# Rofi audio switcher
bind = $mainMod, A, exec, ~/.config/hypr/scripts/audio-switcher.sh

# App launcher
bind = $mainMod, R, exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi -show-icons

# Window switcher
bind = $mainMod, Tab, exec, rofi -show window -theme ~/.config/rofi/launcher.rasi
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard" -theme ~/.config/rofi/launcher.rasi | cliphist decode | wl-copy


