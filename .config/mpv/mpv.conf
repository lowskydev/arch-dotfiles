# =============================================================================
# VIDEO
# =============================================================================

# gpu-next is the new default renderer in mpv 0.41, better Wayland/HDR support
vo=gpu-next
gpu-api=vulkan              # Vulkan is now preferred over OpenGL on NVIDIA
hwdec=auto                  # auto hardware decoding (picks best available)

# Wayland specific
gpu-context=waylandvk        # Vulkan on Wayland

# High quality rendering profile
profile=high-quality
video-sync=display-resample  # smooth sync with display refresh rate
interpolation=yes            # smoother motion (smoothmotion)

# =============================================================================
# WINDOW
# =============================================================================

keep-open=yes                # don't close window when video ends
save-position-on-quit=yes    # resume where you left off
autofit-larger=80%x80%       # don't open larger than 80% of screen

# =============================================================================
# AUDIO
# =============================================================================

ao=pipewire                  # use PipeWire directly
volume=100
volume-max=150               # allow boosting above 100% if needed

# =============================================================================
# SUBTITLES
# =============================================================================

sub-auto=fuzzy               # load subtitles with similar filename
sub-font-size=40
sub-color="#FFFFFFFF"
sub-border-color="#FF000000"
sub-border-size=2

# =============================================================================
# SCREENSHOTS
# =============================================================================

screenshot-format=png
screenshot-dir=~/Pictures/mpv-screenshots
screenshot-template="%F_%P"  # filename_timestamp
